<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
    <title>Incident Reporter</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/app.css">
</head>
<body>
    <div class="container">
        <!-- ========== LOGIN SCREEN ========== -->
        <div id="loginScreen" class="screen active">
            <div class="logo">
                <i class="fas fa-exclamation-triangle"></i>
                <h2>Incident Reporter</h2>
                <p>Citizen Reporting Solution</p>
            </div>
            <div id="loginStatus" class="status-message"></div>
            <input type="text" id="username" placeholder="Username" autocomplete="off">
            <input type="password" id="password" placeholder="Password">
            <button id="loginBtn" class="btn-primary">Login</button>
            <button id="guestBtn" class="btn-secondary">Continue as Guest</button>
        </div>

        <!-- ========== MAIN APP SCREEN ========== -->
        <div id="appScreen" class="screen">
            <!-- Tab Navigation -->
            <div class="tabs">
                <div class="tab active" data-tab="incidents">
                    <i class="fas fa-list"></i>
                    <span>Incidents</span>
                </div>
                <div class="tab" data-tab="report">
                    <i class="fas fa-plus-circle"></i>
                    <span>Report</span>
                </div>
                <div class="tab" data-tab="myincidents">
                    <i class="fas fa-user"></i>
                    <span>My Reports</span>
                </div>
            </div>

            <!-- ===== INCIDENTS TAB ===== -->
            <div id="incidentsTab" class="tab-content active">
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" id="searchInput" placeholder="Search incidents...">
                </div>
                <div id="categoryFilters" class="filters"></div>
                <div id="incidentsList" class="incidents-list">
                    <div class="loading">Loading incidents...</div>
                </div>
            </div>

            <!-- ===== REPORT TAB ===== -->
            <div id="reportTab" class="tab-content">
                <form id="reportForm">
                    <label>Incident Type</label>
                    <select id="incidentCategory" required>
                        <option value="">Select type</option>
                        <option value="Accident">🚗 Accident</option>
                        <option value="Fighting">👊 Fighting</option>
                        <option value="Rioting">🔥 Rioting</option>
                        <option value="Fire">🪵 Fire</option>
                        <option value="Other">📌 Other</option>
                    </select>
                    
                    <label>Description</label>
                    <textarea id="incidentDesc" rows="4" placeholder="Describe what happened..." required></textarea>
                    
                    <label>Location</label>
                    <div class="location-box" id="locationBox">
                        <i class="fas fa-map-marker-alt"></i>
                        <span id="locationStatus">Tap to get location</span>
                    </div>
                    <input type="hidden" id="lat">
                    <input type="hidden" id="lng">
                    
                    <label>Photo</label>
                    <div id="photoPreview" class="photo-preview"></div>
                    <div class="photo-buttons">
                        <button type="button" id="takePhotoBtn" class="btn-secondary"><i class="fas fa-camera"></i> Take Photo</button>
                        <button type="button" id="selectPhotoBtn" class="btn-secondary"><i class="fas fa-image"></i> Gallery</button>
                    </div>
                    <input type="hidden" id="photoData">
                    
                    <button type="button" id="submitBtn" class="btn-primary">Submit Incident</button>
                </form>
            </div>

            <!-- ===== MY INCIDENTS TAB ===== -->
            <div id="myincidentsTab" class="tab-content">
                <div id="myIncidentsList" class="incidents-list">
                    <div class="loading">Loading your reports...</div>
                </div>
            </div>
        </div>
    </div>

    <script src="cordova.js"></script>
    <script src="js/app.js"></script>
</body>
                    </html>
