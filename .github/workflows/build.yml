name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: Install Cordova
        run: npm install -g cordova
      
      - name: Build Cordova App
        run: |
          # Create project
          cordova create app com.bincom.incidentapp "IncidentReporter"
          
          # Copy your files
          cp -r www/* app/www/
          cp config.xml app/
          
          # Build
          cd app
          cordova platform add android
          cordova plugin add cordova-plugin-camera
          cordova plugin add cordova-plugin-geolocation
          cordova plugin add cordova-plugin-dialogs
          cordova plugin add cordova-plugin-vibration
          cordova build android
          
          # Find and show the APK location
          echo "Looking for APK..."
          find . -name "*.apk"
          
          # Go back
          cd ..
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: incident-app
          path: |
            app/platforms/android/app/build/outputs/apk/debug/app-debug.apk
            app/platforms/android/app/build/outputs/apk/debug/app.apk
            **/platforms/android/**/*.apk
