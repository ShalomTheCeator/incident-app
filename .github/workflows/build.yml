name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: Install Cordova
        run: npm install -g cordova
      
      - name: Create and Build Cordova App
        run: |
          # Create project
          cordova create MyApp com.bincom.incidentapp "IncidentReporter"
          
          # Copy your files
          cp -r www/* MyApp/www/
          cp config.xml MyApp/
          
          # Build
          cd MyApp
          cordova platform add android
          cordova plugin add cordova-plugin-camera
          cordova plugin add cordova-plugin-geolocation
          cordova plugin add cordova-plugin-dialogs
          cordova plugin add cordova-plugin-vibration
          cordova build android
          
          # Go back to root for artifact upload
          cd ..
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: bincom-incident-app
          path: MyApp/platforms/android/app/build/outputs/apk/debug/app-debug.apk
